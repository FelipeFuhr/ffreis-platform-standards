name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflows-policy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-workflows-policy.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path

  codeql-actions:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-codeql.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      languages: actions
      source-root: .
      upload-sarif: false

  # Validate that all renovate/*.json preset files are valid JSON and all
  # lefthook/*.yml + golangci/*.yml configs are valid YAML.
  validate-presets:
    name: Validate preset files
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-run-commands.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      setup-python: true
      commands: |
        python3 -c "
        import json, glob, sys
        files = sorted(['renovate.json'] + glob.glob('renovate/*.json'))
        failed = []
        for f in files:
            try:
                json.load(open(f))
                print(f'  OK  {f}')
            except json.JSONDecodeError as e:
                print(f'  FAIL {f}: {e}')
                failed.append(f)
        if failed:
            sys.exit(1)
        print(f'All {len(files)} JSON configs are valid.')
        "

        pip install PyYAML --quiet

        python3 -c "
        import yaml, glob, sys
        files = sorted(['lefthook.yml'] + glob.glob('lefthook/*.yml') + glob.glob('golangci/*.yml'))
        failed = []
        for f in files:
            try:
                yaml.safe_load(open(f))
                print(f'  OK  {f}')
            except yaml.YAMLError as e:
                print(f'  FAIL {f}: {e}')
                failed.append(f)
        if failed:
            sys.exit(1)
        print(f'All {len(files)} YAML config files are valid.')
        "

  shellcheck:
    name: Shell scripts
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@caa797cc7baec52e99f21b86f532a4b7c88cf4fa # fix/grype-install-outside-scan-path
    with:
      working-directory: .
