name: DevOps / Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: "9 12 6 * *"  # monthly scattered (was: 0 6 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    # Schedule/dispatch: skip if no security-relevant files changed since last successful scan.
    # PR/push events skip this job; the 'changes' job handles those paths instead.
    if: github.event_name != 'pull_request' && github.event_name != 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Check if scan needed
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" != "schedule" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          LAST_SHA=$(gh run list \
            --workflow "devops-security.yml" \
            --status success \
            --event schedule \
            --limit 1 \
            --json headSha \
            --jq '.[0].headSha // ""' 2>/dev/null || echo "")
          if [[ -z "$LAST_SHA" || "$LAST_SHA" == "null" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$LAST_SHA" HEAD 2>/dev/null | \
            grep -cE '(Cargo\.(toml|lock)|go\.(mod|sum)|package(-lock)?\.json|yarn\.lock|requirements.*\.txt|Pipfile(\.lock)?|pyproject\.toml|pom\.xml|build\.gradle|\.github/)' \
            || echo 0)
          if [[ "$CHANGED" -gt 0 ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${CHANGED} security-relevant file(s) changed — running scan"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No security-relevant changes since last scan — skipping"
          fi

  changes:
    # PR/push only: skip heavy vuln scanners on docs-only diffs.
    # gitleaks still runs on everything — secrets can hide in markdown too.
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'

  security-fs:
    needs: changes
    if: |
      always() && (
        needs.changes.result == 'skipped' ||
        needs.changes.outputs.code == 'true'
      )
    permissions:
      contents: read
      actions: read
      security-events: write
    # Consolidated fs-security bundle: Trivy(fs) + Grype(fs) + gitleaks in ONE job
    # (was 3 separate jobs). upload-sarif off: GHAS/code-scanning not enabled.
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-security-fs.yml@3858e9e74c805067e454740b195372c7195f333b # v1.5.0
    with:
      working-directory: "."
      scan-history: true
      upload-sarif: false
