name: DevOps / Automation

on:
  schedule:
    - cron: "0 3 * * 0" # Sundays 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Release-please creates versioned releases when conventional-commit PRs are merged.
# Disable by setting vars.RELEASE_PLEASE_ENABLED = 'false' in the repo's GitHub settings.
# Versioned tags (v1.0.0, v1.1.0…) let callers pin to stable preset versions:
#   "extends": ["github>FelipeFuhr/ffreis-platform-standards:renovate/go#v1.0.0"]
jobs:
  scorecard:
    if: vars.SCORECARD_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      upload-sarif: true

  stale:
    if: vars.STALE_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      only: "both"

  release-please:
    if: vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@01e2b12e992621fecf074b8a202f66044196f3bf # v1.0.4
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
