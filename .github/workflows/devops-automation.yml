name: DevOps / Automation

on:
  schedule:
    - cron: "7 18 10 * *"  # monthly scattered (was: 0 3 * * 0)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Release-please creates versioned releases when conventional-commit PRs are merged.
# Disable by setting vars.RELEASE_PLEASE_ENABLED = 'false' in the repo's GitHub settings.
# Versioned tags (v1.0.0, v1.1.0…) let callers pin to stable preset versions:
#   "extends": ["github>FelipeFuhr/ffreis-platform-standards:renovate/go#v1.0.0"]
jobs:
  scorecard:
    if: |
      (vars.FLEET_SPOT_CI != 'true' || github.event_name == 'workflow_dispatch') &&
      vars.SCORECARD_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      upload-sarif: true

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  stale:
    if: |
      (vars.FLEET_SPOT_CI != 'true' || github.event_name == 'workflow_dispatch') &&
      vars.STALE_ENABLED == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      only: "both"

      runner: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && '["ubuntu-latest"]' || '["self-hosted","spot","linux","x64"]' }}
  release-please:
    if: vars.RELEASE_PLEASE_ENABLED != 'false' && github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-release-please.yml@ce7169b36bd25b1c4c0c8077aa78ecde6d6ca7d5  # v1.6.0
    with:
      target-branch: "main"
    secrets:
      RELEASE_PLEASE_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
