pre-commit:
  commands:
    fmt-check:
      glob: "**/*.py"
      run: make fmt-check

# Heavy whole-tree tiers — see lefthook/base.yml for the run model.
# Run via `lefthook run complex|release --all-files`.
# `lint` (ruff check + mypy) lives here, not in pre-commit: mypy is too slow
# for every commit.
# All targets below are REQUIRED: adding this config to a repo's lefthook
# remotes means the repo must implement every referenced make target.
complex:
  parallel: false
  commands:
    lint:
      glob: "**/*.py"
      run: make lint
    test:
      glob: "**/*.py"
      run: make coverage

release:
  parallel: false
  commands:
    mutation:
      glob: "**/*.py"
      run: make mutation
