pre-commit:
  commands:
    fmt-check:
      glob: "**/*.py"
      run: make fmt-check

# Heavy whole-tree tiers — see lefthook/base.yml for the run model and the
# graceful-skip contract. Run via `lefthook run complex|release --all-files`.
# `lint` (ruff check + mypy) lives here, not in pre-commit: mypy is too slow
# for every commit.
complex:
  parallel: false
  commands:
    lint:
      glob: "**/*.py"
      run: |
        set -eu
        make -n lint >/dev/null 2>&1 || { echo "skip: no 'lint' target"; exit 0; }
        make lint
    test:
      glob: "**/*.py"
      # Prefer the coverage-gated target; fall back to plain test.
      run: |
        set -eu
        if make -n coverage >/dev/null 2>&1; then
          make coverage
        elif make -n test >/dev/null 2>&1; then
          make test
        else
          echo "skip: no 'coverage' or 'test' target"
        fi

release:
  parallel: false
  commands:
    mutation:
      glob: "**/*.py"
      run: |
        set -eu
        make -n mutation >/dev/null 2>&1 || { echo "skip: no 'mutation' target"; exit 0; }
        make mutation
