pre-commit:
  commands:
    fmt-check:
      run: make fmt-check
    lint:
      glob: "**/*.tf"
      run: tflint --recursive --format compact

# Heavy whole-tree tiers — see lefthook/base.yml for the run model and the
# graceful-skip contract. Run via `lefthook run complex|release --all-files`.
complex:
  parallel: false
  commands:
    validate:
      glob: "**/*.tf"
      run: |
        set -eu
        make -n validate >/dev/null 2>&1 || { echo "skip: no 'validate' target"; exit 0; }
        make validate

release:
  parallel: false
  commands:
    # `plan` touches a backend / needs credentials and is env-sensitive — keep
    # it out of complex; it only runs on version-significant changes, and only
    # if the repo exposes a safe (dev-targeted) `plan` target.
    plan:
      glob: "**/*.tf"
      run: |
        set -eu
        make -n plan >/dev/null 2>&1 || { echo "skip: no 'plan' target"; exit 0; }
        make plan
    sec:
      glob: "**/*.tf"
      run: |
        set -eu
        if make -n sec >/dev/null 2>&1; then
          make sec
        elif command -v tfsec >/dev/null 2>&1; then
          tfsec .
        else
          echo "skip: no 'sec' target and tfsec not installed"
        fi
