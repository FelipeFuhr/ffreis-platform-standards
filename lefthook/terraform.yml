pre-commit:
  commands:
    fmt-check:
      run: make fmt-check
    lint:
      glob: "**/*.tf"
      run: tflint --recursive --format compact

# Heavy whole-tree tiers — see lefthook/base.yml for the run model.
# Run via `lefthook run complex|release --all-files`.
# All targets below are REQUIRED: adding this config to a repo's lefthook
# remotes means the repo must implement every referenced make target.
complex:
  parallel: false
  commands:
    validate:
      glob: "**/*.tf"
      run: make validate

release:
  parallel: false
  commands:
    # `plan` touches a backend / needs credentials and is env-sensitive — keep
    # it out of complex; it only runs on version-significant changes, and only
    # if the repo exposes a safe (dev-targeted) `plan` target.
    plan:
      glob: "**/*.tf"
      run: make plan
    sec:
      glob: "**/*.tf"
      run: make sec
