pre-commit:
  commands:
    fmt-check:
      glob: "**/*.rs"
      run: make fmt-check

# Heavy whole-tree tiers — see lefthook/base.yml for the run model.
# Run via `lefthook run complex|release --all-files`.
# clippy (`make lint`) lives here, not in pre-commit: it is a full typecheck
# pass and too slow for every commit.
# All targets below are REQUIRED: adding this config to a repo's lefthook
# remotes means the repo must implement every referenced make target.
complex:
  parallel: false
  commands:
    lint:
      glob: "**/*.rs"
      run: make lint
    test:
      glob: "**/*.rs"
      run: make test
    sec:
      glob: "**/*.{rs,toml}"
      run: make sec
    coverage:
      glob: "**/*.rs"
      run: make coverage-gate

release:
  parallel: false
  commands:
    release-build:
      glob: "**/*.rs"
      run: make build-release
    mutation:
      glob: "**/*.rs"
      run: make mutation
