pre-commit:
  commands:
    fmt-check:
      glob: "**/*.rs"
      run: make fmt-check

# Heavy whole-tree tiers — see lefthook/base.yml for the run model and the
# graceful-skip contract. Run via `lefthook run complex|release --all-files`.
# clippy (`make lint`) lives here, not in pre-commit: it is a full typecheck
# pass and too slow for every commit.
complex:
  parallel: false
  commands:
    lint:
      glob: "**/*.rs"
      run: |
        set -eu
        make -n lint >/dev/null 2>&1 || { echo "skip: no 'lint' target"; exit 0; }
        make lint
    test:
      glob: "**/*.rs"
      run: |
        set -eu
        make -n test >/dev/null 2>&1 || { echo "skip: no 'test' target"; exit 0; }
        make test
    sec:
      glob: "**/*.{rs,toml}"
      run: |
        set -eu
        make -n sec >/dev/null 2>&1 || { echo "skip: no 'sec' target"; exit 0; }
        make sec
    coverage:
      glob: "**/*.rs"
      run: |
        set -eu
        make -n coverage-gate >/dev/null 2>&1 || { echo "skip: no 'coverage-gate' target"; exit 0; }
        make coverage-gate

release:
  parallel: false
  commands:
    release-build:
      glob: "**/*.rs"
      run: |
        set -eu
        make -n build-release >/dev/null 2>&1 || { echo "skip: no 'build-release' target"; exit 0; }
        make build-release
    mutation:
      glob: "**/*.rs"
      run: |
        set -eu
        make -n mutation >/dev/null 2>&1 || { echo "skip: no 'mutation' target"; exit 0; }
        make mutation
