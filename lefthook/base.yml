pre-commit:
  parallel: true
  commands:
    hygiene-merge-markers:
      run: |
        set -eu
        tmpfiles=$(mktemp)
        trap 'rm -f "$tmpfiles"' EXIT
        git diff --cached --name-only -z > "$tmpfiles"
        [ -s "$tmpfiles" ] || exit 0
        bad=$(xargs -0 grep -l '^<<<<<<< \|^=======$\|^>>>>>>> ' < "$tmpfiles" 2>/dev/null || true)
        if [ -n "$bad" ]; then
          echo "merge markers in: $bad" >&2
          exit 1
        fi
    hygiene-large-files:
      run: |
        set -eu
        # lefthook executes inline `run:` blocks via /bin/sh, not bash, so
        # process substitution (`< <(...)`) and `read -d ''` aren't available.
        # Use a temp file fed from `git diff -z | tr` to stay POSIX.
        MAX_BYTES=$((500 * 1024))
        tmpfiles=$(mktemp)
        trap 'rm -f "$tmpfiles"' EXIT
        git diff --cached --name-only -z | tr '\0' '\n' > "$tmpfiles"
        [ -s "$tmpfiles" ] || exit 0
        while IFS= read -r file; do
          [ -n "$file" ] || continue
          [ -f "$file" ] || continue
          size=$(git cat-file -s ":$file" 2>/dev/null || echo 0)
          if [ "$size" -gt "$MAX_BYTES" ]; then
            echo "large file ($((size / 1024)) KB): $file" >&2
            exit 1
          fi
        done < "$tmpfiles"
    hygiene-binary-files:
      run: |
        set -eu
        # See hygiene-large-files for the POSIX rationale.
        tmpfiles=$(mktemp)
        trap 'rm -f "$tmpfiles"' EXIT
        git diff --cached --name-only -z | tr '\0' '\n' > "$tmpfiles"
        [ -s "$tmpfiles" ] || exit 0
        while IFS= read -r file; do
          [ -n "$file" ] || continue
          [ -f "$file" ] || continue
          mime=$(file --mime-type -b "$file")
          case "$mime" in
            text/*|application/json|application/xml|application/x-sh|inode/x-empty) ;;
            *) echo "binary file staged: $file ($mime)" >&2; exit 1 ;;
          esac
        done < "$tmpfiles"
    secret-scan:
      run: make secrets-scan-staged
    agents-drift-hint:
      run: |
        changed=$(git diff --cached --name-only 2>/dev/null)
        if echo "$changed" | grep -qE '\.(go|py|rs|tf)$' && \
           ! echo "$changed" | grep -q 'AGENTS\.md'; then
          echo "hint: source files changed — check if AGENTS.md needs updating" >&2
        fi
        exit 0
    actionlint-workflows:
      # Lints staged .github/workflows/*.yml/*.yaml with actionlint. Catches
      # the codeql-orphaned-SHA class of errors at commit time (see
      # project_codeql_action_orphaned_sha memory) instead of in CI minutes.
      # Skips silently when actionlint isn't installed locally.
      run: |
        set -eu
        command -v actionlint >/dev/null 2>&1 || exit 0
        wf=$(git diff --cached --name-only -z \
               | tr '\0' '\n' \
               | grep -E '^\.github/workflows/.*\.(yml|yaml)$' || true)
        [ -z "$wf" ] && exit 0
        echo "$wf" | xargs -r actionlint
    ci-local-drift:
      # When workflow files change, verify every reusable-workflow they
      # reference is classified in the ci-local tool registry (the drift gate):
      # a new CI check can't silently skip running locally. Fetches the check +
      # registry from the public ffreis-platform-ci-local repo. Skips silently
      # without python3/curl or when offline (best-effort local guard; CI is the
      # authoritative gate).
      run: |
        set -eu
        wf=$(git diff --cached --name-only -z \
               | tr '\0' '\n' \
               | grep -E '^\.github/workflows/.*\.(yml|yaml)$' || true)
        [ -z "$wf" ] && exit 0
        command -v python3 >/dev/null 2>&1 || exit 0
        command -v curl >/dev/null 2>&1 || exit 0
        base="https://raw.githubusercontent.com/FelipeFuhr/ffreis-platform-ci-local/main/scripts"
        tmp=$(mktemp -d)
        trap 'rm -rf "$tmp"' EXIT
        curl -fsSL "$base/ci-local-drift.py" -o "$tmp/d.py" 2>/dev/null \
          || { echo "ci-local drift: offline, skipping (CI will enforce)"; exit 0; }
        curl -fsSL "$base/ci-local-tools.tsv" -o "$tmp/t.tsv" 2>/dev/null || exit 0
        python3 "$tmp/d.py" --registry "$tmp/t.tsv" --workflows .github/workflows --enforce
    hadolint-dockerfiles:
      # Lints staged Dockerfile* with hadolint. Catches a dozen common
      # security/correctness issues (latest tags, apt-get without --no-install-
      # recommends, USER-less containers, ADD over COPY) before they ship.
      # Skips silently when hadolint isn't installed.
      run: |
        set -eu
        command -v hadolint >/dev/null 2>&1 || exit 0
        df=$(git diff --cached --name-only -z \
               | tr '\0' '\n' \
               | grep -E '(^|/)Dockerfile([.-].*)?$' || true)
        [ -z "$df" ] && exit 0
        echo "$df" | xargs -r hadolint

commit-msg:
  commands:
    conventional-commits:
      run: |
        set -eu
        msg=$(head -1 "{1}")
        pattern='^(feat|fix|docs|chore|refactor|test|ci|perf|style|build|revert)(\([a-z0-9-]+\))?: .{1,100}$'
        echo "$msg" | grep -qE "$pattern" || {
          echo "non-conventional commit: $msg" >&2
          echo "expected: type: description  or  type(scope): description  [types: feat fix docs chore refactor test ci perf style build revert]" >&2
          exit 1
        }

# ----------------------------------------------------------------------------
# COMPLEX (tier-1) — heavy, whole-tree verification. NOT a git hook stage:
# run explicitly via `lefthook run complex --all-files`, locally before a
# draft->ready promotion (/ready) and as the manual workflow_dispatch CI step.
# Language configs (go/python/rust/terraform.yml) merge their own `complex:`
# commands into this group. Commands delegate to Makefile targets and SKIP
# gracefully when the target is absent (`make -n` existence probe), so repos
# adopt incrementally without breaking the group.
# ----------------------------------------------------------------------------
complex:
  parallel: false
  commands:
    secret-scan-full:
      # Whole-tree secret scan (the pre-commit `secret-scan` is staged-only).
      run: |
        set -eu
        if make -n secrets-scan-full >/dev/null 2>&1; then
          make secrets-scan-full
        elif command -v gitleaks >/dev/null 2>&1; then
          gitleaks detect --no-banner --redact
        else
          echo "skip: no 'secrets-scan-full' target and gitleaks not installed"
        fi

# ----------------------------------------------------------------------------
# RELEASE (tier-2) — version-significant verification, run IN ADDITION to
# `complex` only when the branch's conventional commits imply a minor/major
# bump (see quality-kit/scripts/semver-bump.sh). Invoke via
# `lefthook run release --all-files`. Same graceful-skip contract as complex.
# ----------------------------------------------------------------------------
release:
  parallel: false
  commands:
    osv-scan:
      # Deep dependency-vulnerability scan across the whole tree.
      run: |
        set -eu
        if make -n osv-scan >/dev/null 2>&1; then
          make osv-scan
        elif command -v osv-scanner >/dev/null 2>&1; then
          osv-scanner scan --recursive .
        else
          echo "skip: no 'osv-scan' target and osv-scanner not installed"
        fi
