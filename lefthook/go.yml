pre-commit:
  commands:
    go-mod-drift:
      run: |
        set -eu
        [ -f go.mod ] || exit 0
        tmp=$(mktemp -d)
        cp go.mod "$tmp/go.mod"
        had_sum=0
        [ -f go.sum ] && { cp go.sum "$tmp/go.sum"; had_sum=1; }
        cleanup() {
          cp "$tmp/go.mod" go.mod
          if [ "$had_sum" -eq 1 ]; then
            cp "$tmp/go.sum" go.sum
          else
            rm -f go.sum
          fi
          rm -rf "$tmp"
        }
        trap cleanup EXIT
        go mod tidy 2>/dev/null
        drift=0
        diff -q go.mod "$tmp/go.mod" > /dev/null 2>&1 || drift=1
        if [ -f go.sum ]; then
          if [ "$had_sum" -eq 1 ]; then
            diff -q go.sum "$tmp/go.sum" > /dev/null 2>&1 || drift=1
          else
            drift=1
          fi
        fi
        [ "$drift" -eq 0 ] || {
          echo "go.mod/go.sum drift: run 'go mod tidy' and commit the result" >&2; exit 1; }
    fmt-check:
      run: make fmt-check
    lint:
      run: make lint

# Heavy whole-tree tiers — see lefthook/base.yml for the run model and the
# graceful-skip contract. Run via `lefthook run complex|release --all-files`.
complex:
  parallel: false
  commands:
    quality-gates:
      glob: "**/*.{go,mod,sum}"
      # Prefer the repo's bundled gate (test -race + coverage + govulncheck);
      # fall back to plain `make test` for repos that haven't defined it yet.
      run: |
        set -eu
        if make -n quality-gates >/dev/null 2>&1; then
          make quality-gates
        elif make -n test >/dev/null 2>&1; then
          make test
        else
          echo "skip: no 'quality-gates' or 'test' target"
        fi

release:
  parallel: false
  commands:
    cross-build:
      glob: "**/*.go"
      run: |
        set -eu
        make -n build-all >/dev/null 2>&1 || { echo "skip: no 'build-all' target"; exit 0; }
        make build-all
    mutation:
      glob: "**/*.go"
      run: |
        set -eu
        make -n mutation >/dev/null 2>&1 || { echo "skip: no 'mutation' target"; exit 0; }
        make mutation
    fuzz:
      glob: "**/*.go"
      run: |
        set -eu
        make -n fuzz >/dev/null 2>&1 || { echo "skip: no 'fuzz' target"; exit 0; }
        make fuzz
